<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/rest.css">
  <link rel="stylesheet" href="/css/Formework.css">
  <title>Formeork</title>
</head>
<body> 
  <div class="form-container">
    <div class="top-decoration"></div>
      <h1 style="font-size: 32px; font-weight: 400">F2E02表單練習</h1>
      <div style="font-size: 15px; margin: 12px 0 0">僅供新尖兵 F2E02 表單切版練習作業</div>
      <hr/>
      <div style="font-size: 14px; font-weight: 700; color:#5e5e5e;">yam60105@gmail.com 
      <u style="color:#0b57d0;">切換帳戶</u>
      </div>
      <br/>
      <div style="font-size: 14px; color:#5e5e5e;">未共用的項目</div>
      <hr/>
      <div style="font-size: 14px; color:#db372d;">* 表示必填問題</div>

      <div class="form-blocks">
        <div class="form-questions">
          姓名 
          <span style="color:#db372d;">*</span>
        </div>
        <input class="input-box" placeholder="您的回答" required>
      </div>

      <div class="form-blocks">
        <div class="form-questions">
          信箱 
          <span style="color:#db372d;">*</span>
        </div>
        <input class="input-box" type="email"  placeholder="您的回答" required>
      </div>
      
      <div class="form-blocks">
        <div class="form-questions">生日</div>
        <div style="font-size: 12px; color: rgb(117, 117, 117)">日期</div>
        <input class="date-box" type="date">
      </div>
      
      <div class="form-blocks">
        <div class="form-questions">想跟老師說悄悄話</div>
        <input class="input-box" type="text" placeholder="您的回答" required>
      </div>
      
      <div id="favoriteColorBlock" class="form-blocks">
      <div class="form-questions" >喜歡的顏色</div>
        <div><input type="radio" name="color" value="yellow" id="yellow"> 黃色</div>
        <div><input type="radio" name="color" value="green" id="green"> 綠色</div>
        <div><input type="radio" name="color" value="red" id="red"> 紅色</div>
        <p id="hintBlock" class="hintBlock">清除選取項目</p>
      </div>


      <div class="form-blocks">
        <div class="form-questions">喜歡吃的飲食類型</div>
        <div><input type="checkbox" name="food" value="">中式</div>
        <div><input type="checkbox" name="food" value="">義式</div>
        <div><input type="checkbox" name="food" value="">日式</div>
        <div><input type="checkbox" name="food" value="">韓式</div>
        <div><input type="checkbox" name="food" value="">美式</div>
        <div><input type="checkbox" name="food" value="">泰式</div>
      </div>

      <div class="form-blocks">
      <div class="form-questions">最想去的國家 (使用 optgroup 將選項分為不同洲)</div>
      <select class="select-box">
        <optgroup label="亞洲">
          <option value="korea">韓國</option>
          <option value="japan">日本</option>
          <option value="taiwan">台灣</option>
        </optgroup>
        <optgroup label="歐洲">
          <option value="france">法國</option>
          <option value="germany">德國</option>
          <option value="italy">義大利</option>
        </optgroup>
      </select>
      </div>


      <div class="form-function-btns">
        <button class="submit-btn">提交</button> 
        <div class="clear-form">
        <a href="#" style="color: inherit; text-decoration: none;">清除表單</a>
        </div>
      </div>

      <div class="warming">
        <p>請勿利用 Google 表單送出密碼。</p>
      </div>

      <div class="form-container1">
        <p>
          這份表單是在 五倍紅寶石程式資訊教育股份有限公司 中建立。 
          聯絡表單擁有者
        </p>  
        <p>這份表單很可疑嗎？ 報告</p>
      </div>



      <div class="google-form">Google 表單</div>
      <script src="Formework.js"></script>
</body>
</html>
